{% extends "layout.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[calc(100vh-80px)] px-6 bg-grid">
    <div class="w-full max-w-sm reveal">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-12 h-12 border border-zinc-800 bg-zinc-900 rounded-lg mb-6 shadow-sm">
                <svg class="w-6 h-6 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-zinc-100">Sign in to your account</h1>
            <p class="text-zinc-500 text-[11px] font-mono mt-2 tracking-widest uppercase">Administrative Control Panel</p>
        </div>

        <div class="bg-zinc-900 border border-zinc-800 p-8 shadow-xl rounded-md">
            <form method="POST" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-mono font-bold text-zinc-500 uppercase tracking-widest ml-1">Username</label>
                    <input type="text" name="username" required placeholder="name@example.com"
                           class="w-full bg-zinc-950 border border-zinc-800 rounded px-4 py-2.5 text-sm text-zinc-200 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all placeholder:text-zinc-800">
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-[10px] font-mono font-bold text-zinc-500 uppercase tracking-widest ml-1">Password</label>
                    </div>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full bg-zinc-950 border border-zinc-800 rounded px-4 py-2.5 text-sm text-zinc-200 outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all placeholder:text-zinc-800">
                </div>

                {% if error %}
                <div class="p-3 bg-red-950/20 border border-red-900/30 text-red-500 text-xs rounded flex items-center gap-3">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span>{{ error }}</span>
                </div>
                {% endif %}

                <button type="submit" class="w-full btn btn-primary py-3 font-semibold text-xs uppercase tracking-widest">
                    Continue
                </button>
            </form>
        </div>

        <div class="mt-8 text-center">
            <a href="/" class="text-[10px] font-mono text-zinc-600 hover:text-zinc-300 uppercase tracking-widest transition-colors">
                Back to site
            </a>
        </div>
    </div>
</div>
{% endblock %}
